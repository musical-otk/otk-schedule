<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>관극 스케줄</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/otk-schedule/icon-192-v2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a1a1a" id="meta-theme">
  <style>
    /* ── 다크 ── */
    :root {
      --bg1: #111118;
      --bg2: #1a1a24;
      --bg3: #22222e;
      --border: #333340;
      --text1: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666670;
      --roger: #7aacff;
      --stone: #f06070;
      --attended: #44aa66;
      --custom: #a78bfa;
      --roger-bg: rgba(90,140,221,0.16);
      --roger-bd: rgba(122,172,255,0.36);
      --stone-bg: rgba(217,64,80,0.16);
      --stone-bd: rgba(240,96,112,0.36);
      --custom-bg: rgba(167,139,250,0.16);
      --custom-bd: rgba(167,139,250,0.36);
    }
    /* ── 라이트 ── */
    body.light {
      --bg1: #f8f8f6;
      --bg2: #ffffff;
      --bg3: #f0f0ee;
      --border: #e0e0dc;
      --text1: #1a1a1a;
      --text2: #555550;
      --text3: #999990;
      --roger: #2a5caa;
      --stone: #B8182A;
      --attended: #2a8a4a;
      --custom: #7c3aed;
      --roger-bg: rgba(42,92,170,0.08);
      --roger-bd: rgba(42,92,170,0.28);
      --stone-bg: rgba(184,24,42,0.08);
      --stone-bd: rgba(184,24,42,0.28);
      --custom-bg: rgba(124,58,237,0.08);
      --custom-bd: rgba(124,58,237,0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: var(--bg1); color: var(--text1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    /* ── 앱 래퍼 ── */
    #app {
      max-width: 480px; margin: 0 auto;
      height: 100dvh; display: flex; flex-direction: column;
    }

    /* ── 헤더 ── */
    .header {
      flex-shrink: 0;
      background: var(--bg1); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top));
      transition: background 0.2s, border-color 0.2s;
    }
    .header-title {
      font-size: 13px; font-weight: 700; flex: 1; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hbtn {
      background: none; border: none; cursor: pointer; color: var(--text2);
      font-size: 15px; padding: 5px 6px; border-radius: 8px; line-height: 1;
      flex-shrink: 0; transition: background 0.15s;
    }
    .hbtn:active { background: var(--bg3); }
    .app-btn {
      padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0; cursor: pointer;
      border: 1px solid var(--border); background: none; color: var(--text3);
      transition: all 0.15s;
    }
    .app-btn:active { opacity: 0.7; }
    .app-btn.active.roger { background: var(--roger-bg); color: var(--roger); border-color: var(--roger-bd); }
    .app-btn.active.stone { background: var(--stone-bg); color: var(--stone); border-color: var(--stone-bd); }

    /* ── 달력 뷰 ── */
    #view-cal {
      flex: 1; overflow-y: auto;
    }
    #view-cal.hidden { display: none; }

    /* ── iframe ── */
    .app-frame {
      flex: 1; border: none; display: none;
    }
    .app-frame.active { display: block; }

    /* ── 월 네비 ── */
    .cal-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px 8px;
    }
    .nav-btn {
      background: none; border: none; color: var(--text2); font-size: 22px;
      cursor: pointer; padding: 4px 10px; border-radius: 8px;
    }
    .nav-btn:active { background: var(--bg3); }
    .cal-month { font-size: 17px; font-weight: 700; }

    /* ── 달력 ── */
    .cal-grid { padding: 0 10px 24px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .dow-cell { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-weight: 600; }
    .dow-cell:first-child { color: #c06060; }
    .dow-cell:last-child  { color: var(--roger); }

    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      display: flex; flex-direction: column; align-items: center;
      padding: 5px 2px 4px; border-radius: 8px; min-height: 54px; cursor: default;
    }
    .cal-cell.has-schedule { background: var(--bg2); }
    .cal-cell.clickable    { cursor: pointer; }
    .cal-cell.clickable:active { background: var(--bg3); }

    .date-wrap { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
    .date-num  { font-size: 13px; color: var(--text2); font-weight: 500; line-height: 1; }
    .cal-cell.sunday   .date-num { color: #c06060; }
    .cal-cell.saturday .date-num { color: var(--roger); }
    .cal-cell.today .date-wrap   { background: var(--text1); border-radius: 50%; }
    .cal-cell.today .date-num    { color: var(--bg1); font-weight: 700; }

    .attended-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--attended); margin-bottom: 2px; }

    .badges { display: flex; flex-direction: column; gap: 1px; align-items: flex-start; width: 100%; padding: 0 2px; }
    .badge-row { display: flex; align-items: center; gap: 2px; width: 100%; }
    .badge  { font-size: 8px; font-weight: 700; padding: 1px 3px; border-radius: 3px; line-height: 1.5; flex-shrink: 0; }
    .badge.roger  { background: var(--roger-bg);  color: var(--roger); }
    .badge.stone  { background: var(--stone-bg);  color: var(--stone); }
    .badge.custom { background: var(--custom-bg); color: var(--custom); }
    .badge-time { font-size: 8px; color: var(--text2); white-space: nowrap; }
    .att-chk { font-size: 8px; line-height: 1; flex-shrink: 0; min-width: 11px; text-align: center; }

    /* ── FAB ── */
    .fab {
      position: sticky; bottom: 20px; float: right; right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--custom); color: #fff;
      border: none; font-size: 22px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.35); margin: -54px 16px 20px auto;
      flex-shrink: 0;
    }
    .fab:active { opacity: 0.8; }

    /* ── 로딩 ── */
    .loading { text-align: center; padding: 48px 16px; color: var(--text3); font-size: 13px; }

    /* ── 오버레이 ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.48);
      display: flex; align-items: flex-end; z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      width: 100%; max-width: 480px; margin: 0 auto;
      background: var(--bg2); border-radius: 20px 20px 0 0;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      transform: translateY(100%); overflow-y: auto;
      transition: background 0.2s, transform 0.26s cubic-bezier(.32,.72,0,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }

    /* ── 날짜 상세 ── */
    #sheet-detail { max-height: 70vh; }
    .sheet-date { font-size: 14px; font-weight: 700; color: var(--text2); padding: 14px 16px 10px; }
    .session-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border-top: 1px solid var(--border);
    }
    .session-time { font-size: 14px; font-weight: 700; min-width: 46px; padding-top: 2px; }
    .session-body { flex: 1; }
    .session-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px; margin-bottom: 4px; line-height: 1.5;
    }
    .session-tag.roger  { background: var(--roger-bg);  color: var(--roger); }
    .session-tag.stone  { background: var(--stone-bg);  color: var(--stone); }
    .session-tag.custom { background: var(--custom-bg); color: var(--custom); }
    .session-cast { font-size: 14px; font-weight: 500; }
    .session-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .session-attended { font-size: 11px; color: var(--attended); }

    /* ── 설정 ── */
    #sheet-settings { max-height: 85vh; }
    .settings-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .settings-title { font-size: 15px; font-weight: 700; }
    .settings-close {
      background: none; border: none; color: var(--text2);
      font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
    }
    .settings-body { padding: 0 16px 8px; }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--text3);
      letter-spacing: 0.4px; padding: 10px 0 8px;
      border-top: 1px solid var(--border);
    }
    .hint { font-size: 11px; color: var(--text3); padding-bottom: 10px; }
    .actor-list { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 4px; }
    .chip {
      padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text2); transition: all 0.15s;
    }
    .chip.on.roger { background: var(--roger-bg); color: var(--roger); border-color: var(--roger-bd); }
    .chip.on.stone { background: var(--stone-bg); color: var(--stone); border-color: var(--stone-bd); }

    /* ── 상세 헤더 ── */
    .sheet-date-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
    .sheet-date { font-size: 14px; font-weight: 700; color: var(--text2); }
    .sheet-add-btn {
      background: var(--custom-bg); color: var(--custom); border: 1px solid var(--custom-bd);
      border-radius: 16px; font-size: 11px; font-weight: 700;
      padding: 4px 10px; cursor: pointer;
    }
    /* ── 커스텀 이벤트 액션 ── */
    .session-acts { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; padding-top: 2px; }
    .session-act-btn {
      background: none; border: none; color: var(--text3); font-size: 15px;
      cursor: pointer; padding: 3px 5px; border-radius: 6px; line-height: 1;
    }
    .session-act-btn:active { background: var(--bg3); }
    /* ── 커스텀 폼 ── */
    #sheet-custom { max-height: 90vh; }
    .custom-hd { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
    .custom-title { font-size: 15px; font-weight: 700; }
    .custom-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .form-row { padding: 8px 16px; }
    .form-label { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 5px; }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text1);
      font-size: 14px; font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--custom-bd); }
    .form-actions { display: flex; gap: 8px; padding: 16px; }
    .btn-primary { flex: 1; background: var(--custom); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-cancel  { padding: 12px 18px; background: var(--bg3); border: none; border-radius: 10px; color: var(--text2); font-size: 14px; cursor: pointer; }
    /* ── 색상 선택 ── */
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.15s; flex-shrink: 0;
    }
    .color-swatch.selected { border-color: var(--text1); transform: scale(1.2); }
    .color-swatch:active { transform: scale(0.9); }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-title" onclick="goToToday()">관극 스케줄</div>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    <button class="hbtn" onclick="openSettings()">⚙️</button>
    <button class="app-btn" id="btn-roger" onclick="switchView('roger')">✈ 라져</button>
    <button class="app-btn" id="btn-stone" onclick="switchView('stone')">🪨 스톤</button>
  </div>

  <!-- 달력 뷰 -->
  <div id="view-cal">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">
        <div class="dow-cell">일</div><div class="dow-cell">월</div>
        <div class="dow-cell">화</div><div class="dow-cell">수</div>
        <div class="dow-cell">목</div><div class="dow-cell">금</div>
        <div class="dow-cell">토</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="status" class="loading">스케줄 불러오는 중…</div>
    <button class="fab" onclick="openCustomForm('')">+</button>
  </div>

  <!-- 앱 iframe -->
  <iframe id="frame-roger" class="app-frame" src="about:blank"></iframe>
  <iframe id="frame-stone" class="app-frame" src="about:blank"></iframe>

</div>

<!-- 날짜 상세 -->
<div class="overlay" id="ov-detail" onclick="closeOnBg(event,'ov-detail')">
  <div class="sheet" id="sheet-detail">
    <div class="sheet-handle"></div>
    <div class="sheet-date-row">
      <div class="sheet-date" id="sheet-date"></div>
      <button class="sheet-add-btn" id="sheet-add-btn" onclick="openCustomFormForDay()">+ 기타 추가</button>
    </div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- 커스텀 이벤트 폼 -->
<div class="overlay" id="ov-custom" onclick="closeOnBg(event,'ov-custom')">
  <div class="sheet" id="sheet-custom">
    <div class="sheet-handle"></div>
    <div class="custom-hd">
      <div class="custom-title" id="custom-form-title">기타 일정 추가</div>
      <button class="custom-close" onclick="closeCustomForm()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-label">날짜</div>
      <input class="form-input" type="date" id="cf-date">
    </div>
    <div class="form-row">
      <div class="form-label">시간 (선택)</div>
      <input class="form-input" type="time" id="cf-time" placeholder="예: 14:00">
    </div>
    <div class="form-row">
      <div class="form-label">공연명</div>
      <input class="form-input" type="text" id="cf-name" placeholder="공연 이름">
    </div>
    <div class="form-row">
      <div class="form-label">메모 (선택)</div>
      <input class="form-input" type="text" id="cf-comment" placeholder="메모">
    </div>
    <div class="form-row">
      <div class="form-label">색상</div>
      <div class="color-picker" id="cf-colors"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeCustomForm()">취소</button>
      <button class="btn-primary" onclick="saveCustomEvent()">저장</button>
    </div>
  </div>
</div>

<!-- 설정 -->
<div class="overlay" id="ov-settings" onclick="closeOnBg(event,'ov-settings')">
  <div class="sheet" id="sheet-settings">
    <div class="sheet-handle"></div>
    <div class="settings-hd">
      <div class="settings-title">배우 필터</div>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="hint">선택한 배우의 일정만 달력에 표시됩니다. 아무것도 선택 안 하면 전체 표시.</div>
      <div class="section-title">✈ 라져</div>
      <div class="actor-list" id="roger-actors"></div>
      <div class="section-title" style="margin-top:10px;">🪨 스톤</div>
      <div class="actor-list" id="stone-actors"></div>
    </div>
  </div>
</div>

<script>
  const ROGER_URL = 'https://musical-otk.github.io/roger2026/schedule.json';
  const STONE_URL = 'https://musical-otk.github.io/stone2026_v2/schedule.json';
  const ROGER_APP = 'https://musical-otk.github.io/roger2026/';
  const STONE_APP = 'https://musical-otk.github.io/stone2026_v2/';
  const DOW       = ['일','월','화','수','목','금','토'];
  const PREFS_KEY  = 'hub_prefs';
  const THEME_KEY  = 'hub_theme';
  const CUSTOM_KEY = 'hub_custom';

  const COLOR_PALETTE = [
    '#a78bfa', // purple (default)
    '#f472b6', // pink
    '#fb923c', // orange
    '#facc15', // yellow
    '#4ade80', // green
    '#22d3ee', // cyan
    '#f87171', // red/coral
  ];

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  let _selectedColor = COLOR_PALETTE[0];
  function selectColor(hex) {
    _selectedColor = hex;
    document.querySelectorAll('.color-swatch').forEach(s => {
      s.classList.toggle('selected', s.dataset.hex === hex);
    });
  }
  function renderColorPicker(selectedHex) {
    _selectedColor = selectedHex || COLOR_PALETTE[0];
    document.getElementById('cf-colors').innerHTML = COLOR_PALETTE.map(hex =>
      `<div class="color-swatch${hex === _selectedColor ? ' selected' : ''}"
        style="background:${hex}" data-hex="${hex}"
        onclick="selectColor('${hex}')"></div>`
    ).join('');
  }

  let rogerSchedule = [], stoneSchedule = [];
  let currentYear, currentMonth;
  let currentView = 'cal'; // 'cal' | 'roger' | 'stone'
  const todayStr = new Date().toISOString().slice(0, 10);

  // ── 뷰 전환 ──
  function switchView(view) {
    if (currentView === view) { switchView('cal'); return; }
    currentView = view;

    document.getElementById('view-cal').classList.toggle('hidden', view !== 'cal');
    document.getElementById('frame-roger').classList.toggle('active', view === 'roger');
    document.getElementById('frame-stone').classList.toggle('active', view === 'stone');

    document.getElementById('btn-roger').classList.toggle('active', view === 'roger');
    document.getElementById('btn-roger').classList.toggle('roger', view === 'roger');
    document.getElementById('btn-stone').classList.toggle('active', view === 'stone');
    document.getElementById('btn-stone').classList.toggle('stone', view === 'stone');

    // lazy load iframe
    if (view === 'roger') {
      const f = document.getElementById('frame-roger');
      if (f.src === 'about:blank') f.src = ROGER_APP;
    }
    if (view === 'stone') {
      const f = document.getElementById('frame-stone');
      if (f.src === 'about:blank') f.src = STONE_APP;
    }
  }

  function goToToday() {
    if (currentView !== 'cal') {
      currentView = 'cal';
      document.getElementById('view-cal').classList.remove('hidden');
      document.getElementById('frame-roger').classList.remove('active');
      document.getElementById('frame-stone').classList.remove('active');
      document.getElementById('btn-roger').classList.remove('active','roger');
      document.getElementById('btn-stone').classList.remove('active','stone');
    }
    const t = new Date();
    currentYear = t.getFullYear(); currentMonth = t.getMonth();
    renderCalendar();
  }

  // ── 테마 ──
  function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }
  function applyTheme(theme) {
    document.body.classList.toggle('light', theme === 'light');
    document.getElementById('theme-btn').textContent = theme === 'light' ? '🌙' : '☀️';
    document.getElementById('meta-theme').content = theme === 'light' ? '#f8f8f6' : '#111118';
  }
  function toggleTheme() {
    const next = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  }

  // ── 설정 ──
  function getPrefs() {
    try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || { roger: [], stone: [] }; }
    catch { return { roger: [], stone: [] }; }
  }
  function savePrefs(p) { localStorage.setItem(PREFS_KEY, JSON.stringify(p)); }

  // ── 커스텀 이벤트 ──
  function getCustom() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_KEY)) || []; } catch { return []; }
  }
  function saveCustom(list) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list)); }

  let _customEditId = null;
  let _customFormDs = '';

  function openCustomForm(ds, editId) {
    _customEditId = editId || null;
    _customFormDs = ds || todayStr;
    const ev = editId ? getCustom().find(e => e.id === editId) : null;
    document.getElementById('custom-form-title').textContent = ev ? '기타 일정 수정' : '기타 일정 추가';
    document.getElementById('cf-date').value    = ev ? ev.date    : _customFormDs;
    document.getElementById('cf-time').value    = ev ? ev.time    : '20:00';
    document.getElementById('cf-name').value    = ev ? ev.name    : '';
    document.getElementById('cf-comment').value = ev ? ev.comment : '';
    renderColorPicker(ev ? ev.color : COLOR_PALETTE[0]);
    document.getElementById('ov-detail').classList.remove('open');
    document.getElementById('ov-custom').classList.add('open');
  }
  function openCustomFormForDay() {
    openCustomForm(_customFormDs);
  }
  function closeCustomForm() {
    document.getElementById('ov-custom').classList.remove('open');
  }
  function saveCustomEvent() {
    const date    = document.getElementById('cf-date').value;
    const name    = document.getElementById('cf-name').value.trim();
    if (!date || !name) { alert('날짜와 공연명을 입력해주세요'); return; }
    const time    = document.getElementById('cf-time').value;
    const comment = document.getElementById('cf-comment').value.trim();
    const list = getCustom();
    const color = _selectedColor || COLOR_PALETTE[0];
    if (_customEditId) {
      const idx = list.findIndex(e => e.id === _customEditId);
      if (idx !== -1) list[idx] = { id: _customEditId, date, time, name, comment, color };
    } else {
      list.push({ id: Date.now(), date, time, name, comment, color });
    }
    saveCustom(list);
    closeCustomForm();
    renderCalendar();
  }
  function deleteCustomEvent(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    saveCustom(getCustom().filter(e => e.id !== id));
    document.getElementById('ov-detail').classList.remove('open');
    renderCalendar();
  }

  // ── 관람 기록 ──
  function getAttended() {
    const map = {};
    const load = (key, app) => {
      try {
        (JSON.parse(localStorage.getItem(key) || '[]')).forEach(r => {
          if (!r.date) return;
          (map[r.date] = map[r.date] || []).push({
            app, time: r.time,
            seatZone: r.seatZone, seatRow: r.seatRow, seatNumber: r.seatNumber
          });
        });
      } catch {}
    };
    load('roger_records', 'roger');
    load('stone_records', 'stone');
    return map;
  }

  // ── 배우 목록 ──
  function extractActors(schedule) {
    const s = new Set();
    schedule.forEach(r => { [r.skylar, r.didi, r.role3].forEach(v => v && s.add(v)); });
    return [...s].sort((a, b) => a.localeCompare(b, 'ko'));
  }
  function matchesFilter(session, selected) {
    if (!selected.length) return true;
    return [session.skylar, session.didi, session.role3].filter(Boolean).some(a => selected.includes(a));
  }

  // ── 시간 포맷 ──
  function fmtTime(t) {
    if (!t) return '';
    const h = parseInt(t);
    return (h >= 13 ? h - 12 : h) + '시';
  }

  // ── 달력 ──
  function changeMonth(d) {
    currentMonth += d;
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('cal-month-label').textContent = `${currentYear}년 ${currentMonth + 1}월`;
    const first    = new Date(currentYear, currentMonth, 1).getDay();
    const days     = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prefs    = getPrefs();
    const attended = getAttended();
    const custom   = getCustom();
    let html = '';

    for (let i = 0; i < first; i++) html += '<div class="cal-cell"></div>';

    for (let d = 1; d <= days; d++) {
      const ds  = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = (first + d - 1) % 7;
      const dayAtt   = attended[ds] || [];
      const att      = dayAtt.length > 0;
      const allSess  = [
        ...rogerSchedule.filter(s => s.date === ds && matchesFilter(s, prefs.roger)).map(s => ({...s, app:'roger'})),
        ...stoneSchedule.filter(s => s.date === ds && matchesFilter(s, prefs.stone)).map(s => ({...s, app:'stone'})),
      ].sort((a,b) => a.time.localeCompare(b.time));
      const showC    = custom.filter(e => e.date === ds);
      const hasSch   = allSess.length > 0 || showC.length > 0;
      const isToday  = ds === todayStr;
      const isFuture = ds >= todayStr;

      const cls = ['cal-cell',
        hasSch      ? 'has-schedule' : '',
        att||hasSch ? 'clickable'    : '',
        dow === 0   ? 'sunday'       : '',
        dow === 6   ? 'saturday'     : '',
        isToday     ? 'today'        : '',
      ].filter(Boolean).join(' ');

      const sessBadges = allSess.map(s => {
        const isAtt = dayAtt.some(r => r.app === s.app && (!r.time || r.time === s.time));
        const chk   = isAtt ? '✅' : '';
        const label = s.app === 'roger' ? '라져' : '스톤';
        return `<div class="badge-row">
          <span class="att-chk">${chk}</span>
          <span class="badge ${s.app}">${label}</span>
          <span class="badge-time">${fmtTime(s.time)}</span>
        </div>`;
      }).join('');
      const customBadges = showC.map(e => {
        const chk = '✅';
        const col = e.color || COLOR_PALETTE[0];
        const bg  = hexToRgba(col, 0.16);
        const bd  = hexToRgba(col, 0.36);
        return `<div class="badge-row">
          <span class="att-chk">${chk}</span>
          <span class="badge" style="background:${bg};color:${col};border:1px solid ${bd}">${e.name.length > 3 ? e.name.slice(0,3)+'…' : e.name}</span>
        </div>`;
      }).join('');

      html += `<div class="${cls}" ${att||hasSch ? `onclick="openDay('${ds}')"` : ''}>
        <div class="date-wrap"><span class="date-num">${d}</span></div>
        ${att && !hasSch ? '<div class="attended-dot"></div>' : ''}
        ${hasSch ? `<div class="badges">${sessBadges}${customBadges}</div>` : ''}
      </div>`;
    }
    document.getElementById('cal-days').innerHTML = html;
  }

  // ── 날짜 상세 ──
  function openDay(ds) {
    _customFormDs = ds;
    const attended = getAttended();
    const d = new Date(ds + 'T00:00:00');
    document.getElementById('sheet-date').textContent =
      `${ds.slice(5).replace('-','.')}(${DOW[d.getDay()]})`;

    const prefs = getPrefs();
    const sessions = [
      ...rogerSchedule.filter(s => s.date === ds && matchesFilter(s, prefs.roger)).map(s => ({...s, app:'roger'})),
      ...stoneSchedule.filter(s => s.date === ds && matchesFilter(s, prefs.stone)).map(s => ({...s, app:'stone'})),
    ].sort((a,b) => a.time.localeCompare(b.time));

    const dayAtt  = attended[ds] || [];
    const customs = getCustom().filter(e => e.date === ds)
      .sort((a,b) => (a.time||'').localeCompare(b.time||''));

    const regularHtml = sessions.map(s => {
      const cast   = s.app === 'stone'
        ? [s.skylar, s.didi, s.role3].filter(Boolean).join(' · ')
        : `${s.skylar} · ${s.didi}`;
      const attRec = dayAtt.find(r => r.app === s.app && (!r.time || r.time === s.time));
      const seat   = attRec?.seatZone
        ? [attRec.seatZone + '구역', attRec.seatRow + '열', attRec.seatNumber + '번']
            .filter(Boolean).join(' ')
        : '';
      return `<div class="session-row">
        <div class="session-time">${s.time}</div>
        <div class="session-body">
          <span class="session-tag ${s.app}">${s.app === 'roger' ? '라져' : '스톤'}</span>
          <div class="session-cast">${cast}</div>
          ${attRec ? `<div class="session-meta">
            <span class="session-attended">✓ 관람</span>${seat ? `&nbsp;&nbsp;${seat}` : ''}
          </div>` : ''}
        </div>
      </div>`;
    }).join('');

    const customHtml = customs.map(e => {
      const col = e.color || COLOR_PALETTE[0];
      const bg  = hexToRgba(col, 0.16);
      const bd  = hexToRgba(col, 0.36);
      return `
      <div class="session-row">
        <div class="session-time">${e.time || '—'}</div>
        <div class="session-body">
          <span class="session-tag" style="background:${bg};color:${col};border:1px solid ${bd}">기타</span>
          <div class="session-cast">${e.name}</div>
          ${e.comment ? `<div class="session-meta">${e.comment}</div>` : ''}
        </div>
        <div class="session-acts">
          <button class="session-act-btn" onclick="openCustomForm('${ds}',${e.id})">✏️</button>
          <button class="session-act-btn" onclick="deleteCustomEvent(${e.id})">🗑️</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('sheet-content').innerHTML =
      (regularHtml + customHtml) || '<div style="padding:16px;color:var(--text3);font-size:13px;">일정 없음</div>';

    document.getElementById('ov-detail').classList.add('open');
  }

  // ── 설정 패널 ──
  function openSettings() {
    const prefs = getPrefs();
    renderChips('roger-actors', extractActors(rogerSchedule), prefs.roger, 'roger');
    renderChips('stone-actors', extractActors(stoneSchedule),  prefs.stone, 'stone');
    document.getElementById('ov-settings').classList.add('open');
  }
  function closeSettings() {
    document.getElementById('ov-settings').classList.remove('open');
  }
  function renderChips(id, actors, selected, app) {
    document.getElementById(id).innerHTML = actors.map(a =>
      `<button class="chip ${selected.includes(a) ? 'on '+app : ''}" onclick="toggleActor('${app}','${a}',this)">${a}</button>`
    ).join('');
  }
  function toggleActor(app, name, el) {
    const prefs = getPrefs();
    const idx = prefs[app].indexOf(name);
    if (idx === -1) prefs[app].push(name); else prefs[app].splice(idx, 1);
    savePrefs(prefs);
    el.classList.toggle('on');
    el.classList.toggle(app, prefs[app].includes(name));
    renderCalendar();
  }

  function closeOnBg(e, id) {
    if (e.target === document.getElementById(id))
      document.getElementById(id).classList.remove('open');
  }

  // ── 초기화 ──
  async function init() {
    applyTheme(getTheme());
    const t = new Date();
    currentYear = t.getFullYear(); currentMonth = t.getMonth();
    try {
      const [rRes, sRes] = await Promise.all([fetch(ROGER_URL), fetch(STONE_URL)]);
      rogerSchedule = await rRes.json();
      stoneSchedule = await sRes.json();
      document.getElementById('status').style.display = 'none';
      renderCalendar();
    } catch {
      document.getElementById('status').textContent = '스케줄을 불러오지 못했습니다';
    }
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/otk-schedule/sw.js');
  init();
</script>
</body>
</html>
