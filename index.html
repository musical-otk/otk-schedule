<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>관극 스케줄</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/otk-schedule/icon-192-v2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a1a1a" id="meta-theme">
  <style>
    :root {
      --bg1: #111118;
      --bg2: #1a1a24;
      --bg3: #22222e;
      --border: #333340;
      --text1: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666670;
      --sat: #7aacff;
      --attended: #44aa66;
      --custom: #a78bfa;
      --custom-bg: rgba(167,139,250,0.16);
      --custom-bd: rgba(167,139,250,0.36);
    }
    body.light {
      --bg1: #f8f8f6;
      --bg2: #ffffff;
      --bg3: #f0f0ee;
      --border: #e0e0dc;
      --text1: #1a1a1a;
      --text2: #555550;
      --text3: #999990;
      --sat: #2a5caa;
      --attended: #2a8a4a;
      --custom: #7c3aed;
      --custom-bg: rgba(124,58,237,0.08);
      --custom-bd: rgba(124,58,237,0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: var(--bg1); color: var(--text1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 0.2s, color 0.2s;
    }

    #app {
      max-width: 480px; margin: 0 auto;
      height: 100dvh; display: flex; flex-direction: column;
    }

    .header {
      flex-shrink: 0;
      background: var(--bg1); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px;
      padding-top: calc(10px + env(safe-area-inset-top));
      transition: background 0.2s, border-color 0.2s;
      overflow-x: auto;
    }
    .header-title {
      font-size: 13px; font-weight: 700; flex: 1; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 56px;
    }
    .hbtn {
      background: none; border: none; cursor: pointer; color: var(--text2);
      font-size: 15px; padding: 5px 6px; border-radius: 8px; line-height: 1;
      flex-shrink: 0; transition: background 0.15s;
    }
    .hbtn:active { background: var(--bg3); }
    #app-tabs { display: flex; gap: 6px; flex-shrink: 0; }
    .app-btn {
      padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0; cursor: pointer;
      border: 1px solid var(--border); background: none; color: var(--text3);
      transition: all 0.15s;
    }
    .app-btn:active { opacity: 0.7; }

    #view-cal { flex: 1; overflow-y: auto; }
    #view-cal.hidden { display: none; }

    #app-frames { flex: 1; position: relative; }
    .app-frame { position: absolute; inset: 0; border: none; display: none; width: 100%; height: 100%; }
    .app-frame.active { display: block; }

    .cal-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px 8px;
    }
    .nav-btn {
      background: none; border: none; color: var(--text2); font-size: 22px;
      cursor: pointer; padding: 4px 10px; border-radius: 8px;
    }
    .nav-btn:active { background: var(--bg3); }
    .cal-month { font-size: 17px; font-weight: 700; }

    .cal-grid { padding: 0 10px 24px; }
    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .dow-cell { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-weight: 600; }
    .dow-cell:first-child { color: #c06060; }
    .dow-cell:last-child  { color: var(--sat); }

    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-cell {
      display: flex; flex-direction: column; align-items: center;
      padding: 5px 2px 4px; border-radius: 8px; min-height: 54px; cursor: default;
    }
    .cal-cell.has-schedule { background: var(--bg2); }
    .cal-cell.clickable    { cursor: pointer; }
    .cal-cell.clickable:active { background: var(--bg3); }

    .date-wrap { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
    .date-num  { font-size: 13px; color: var(--text2); font-weight: 500; line-height: 1; }
    .cal-cell.sunday   .date-num { color: #c06060; }
    .cal-cell.saturday .date-num { color: var(--sat); }
    .cal-cell.today .date-wrap   { background: var(--text1); border-radius: 50%; }
    .cal-cell.today .date-num    { color: var(--bg1); font-weight: 700; }

    .attended-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--attended); margin-bottom: 2px; }

    .badges { display: flex; flex-direction: column; gap: 1px; align-items: flex-start; width: 100%; padding: 0 2px; }
    .badge-row { display: flex; align-items: center; gap: 2px; width: 100%; }
    .badge { font-size: 8px; font-weight: 700; padding: 1px 3px; border-radius: 3px; line-height: 1.5; flex-shrink: 0; }
    .badge-time { font-size: 8px; color: var(--text2); white-space: nowrap; }
    .att-chk { font-size: 8px; line-height: 1; flex-shrink: 0; min-width: 11px; text-align: center; }

    .fab {
      position: sticky; bottom: 20px; float: right; right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--custom); color: #fff;
      border: none; font-size: 22px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.35); margin: -54px 16px 20px auto;
      flex-shrink: 0;
    }
    .fab:active { opacity: 0.8; }

    .loading { text-align: center; padding: 48px 16px; color: var(--text3); font-size: 13px; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.48);
      display: flex; align-items: flex-end; z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      width: 100%; max-width: 480px; margin: 0 auto;
      background: var(--bg2); border-radius: 20px 20px 0 0;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      transform: translateY(100%); overflow-y: auto;
      transition: background 0.2s, transform 0.26s cubic-bezier(.32,.72,0,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }

    #sheet-detail { max-height: 70vh; }
    .sheet-date-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
    .sheet-date { font-size: 14px; font-weight: 700; color: var(--text2); }
    .sheet-add-btn {
      background: var(--custom-bg); color: var(--custom); border: 1px solid var(--custom-bd);
      border-radius: 16px; font-size: 11px; font-weight: 700; padding: 4px 10px; cursor: pointer;
    }
    .session-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border-top: 1px solid var(--border);
    }
    .session-time { font-size: 14px; font-weight: 700; min-width: 46px; padding-top: 2px; }
    .session-body { flex: 1; }
    .session-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 5px; margin-bottom: 4px; line-height: 1.5;
    }
    .session-cast { font-size: 14px; font-weight: 500; }
    .session-meta { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .session-attended { font-size: 11px; color: var(--attended); }
    .session-acts { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; padding-top: 2px; }
    .session-act-btn {
      background: none; border: none; color: var(--text3); font-size: 15px;
      cursor: pointer; padding: 3px 5px; border-radius: 6px; line-height: 1;
    }
    .session-act-btn:active { background: var(--bg3); }

    #sheet-settings { max-height: 85vh; }
    .settings-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .settings-title { font-size: 15px; font-weight: 700; }
    .settings-close {
      background: none; border: none; color: var(--text2);
      font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
    }
    .settings-body { padding: 0 16px 8px; }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--text3);
      letter-spacing: 0.4px; padding: 10px 0 8px;
      border-top: 1px solid var(--border);
    }
    .hint { font-size: 11px; color: var(--text3); padding-bottom: 6px; }
    .actor-list { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 4px; }
    .chip {
      padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--bg3); color: var(--text2); transition: all 0.15s;
    }

    .app-list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .app-list-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .app-list-name { flex: 1; font-size: 14px; font-weight: 600; }
    .app-list-del {
      background: none; border: none; color: var(--text3); font-size: 18px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px; line-height: 1;
    }
    .app-list-del:active { background: var(--bg3); }
    .add-app-btn {
      margin: 12px 0 4px; width: 100%; padding: 11px;
      background: none; border: 1.5px dashed var(--border);
      border-radius: 10px; color: var(--text3); font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .add-app-btn:active { background: var(--bg3); }

    #sheet-custom, #sheet-app-form { max-height: 90vh; }
    .custom-hd { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
    .custom-title { font-size: 15px; font-weight: 700; }
    .custom-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .form-row { padding: 8px 16px; }
    .form-label { font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 5px; }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text1);
      font-size: 14px; font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--custom-bd); }
    .form-actions { display: flex; gap: 8px; padding: 16px; }
    .btn-primary { flex: 1; background: var(--custom); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-cancel  { padding: 12px 18px; background: var(--bg3); border: none; border-radius: 10px; color: var(--text2); font-size: 14px; cursor: pointer; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
    .preset-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--bg3);
      cursor: pointer; transition: all 0.15s;
    }
    .preset-item:active { opacity: 0.7; }
    .preset-item.added { opacity: 0.4; cursor: default; pointer-events: none; }
    .preset-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .preset-name { flex: 1; font-size: 14px; font-weight: 600; }
    .preset-add { font-size: 12px; color: var(--text3); font-weight: 700; }

    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.1s, border-color 0.15s; flex-shrink: 0;
    }
    .color-swatch.selected { border-color: var(--text1); transform: scale(1.2); }
    .color-swatch:active { transform: scale(0.9); }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-title" onclick="goToToday()">관극 스케줄</div>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    <button class="hbtn" onclick="openSettings()">⚙️</button>
    <div id="app-tabs"></div>
  </div>

  <div id="view-cal">
    <div class="cal-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">
        <div class="dow-cell">일</div><div class="dow-cell">월</div>
        <div class="dow-cell">화</div><div class="dow-cell">수</div>
        <div class="dow-cell">목</div><div class="dow-cell">금</div>
        <div class="dow-cell">토</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="status" class="loading">스케줄 불러오는 중…</div>
    <button class="fab" onclick="openCustomForm('')">+</button>
  </div>

  <div id="app-frames"></div>

</div>

<!-- 날짜 상세 -->
<div class="overlay" id="ov-detail" onclick="closeOnBg(event,'ov-detail')">
  <div class="sheet" id="sheet-detail">
    <div class="sheet-handle"></div>
    <div class="sheet-date-row">
      <div class="sheet-date" id="sheet-date"></div>
      <button class="sheet-add-btn" onclick="openCustomFormForDay()">+ 기타 추가</button>
    </div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- 커스텀 이벤트 폼 -->
<div class="overlay" id="ov-custom" onclick="closeOnBg(event,'ov-custom')">
  <div class="sheet" id="sheet-custom">
    <div class="sheet-handle"></div>
    <div class="custom-hd">
      <div class="custom-title" id="custom-form-title">기타 일정 추가</div>
      <button class="custom-close" onclick="closeCustomForm()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-label">날짜</div>
      <input class="form-input" type="date" id="cf-date">
    </div>
    <div class="form-row">
      <div class="form-label">시간 (선택)</div>
      <input class="form-input" type="time" id="cf-time">
    </div>
    <div class="form-row">
      <div class="form-label">공연명</div>
      <input class="form-input" type="text" id="cf-name" placeholder="공연 이름">
    </div>
    <div class="form-row">
      <div class="form-label">메모 (선택)</div>
      <input class="form-input" type="text" id="cf-comment" placeholder="메모">
    </div>
    <div class="form-row">
      <div class="form-label">색상</div>
      <div class="color-picker" id="cf-colors"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeCustomForm()">취소</button>
      <button class="btn-primary" onclick="saveCustomEvent()">저장</button>
    </div>
  </div>
</div>

<!-- 설정 -->
<div class="overlay" id="ov-settings" onclick="closeOnBg(event,'ov-settings')">
  <div class="sheet" id="sheet-settings">
    <div class="sheet-handle"></div>
    <div class="settings-hd">
      <div class="settings-title">설정</div>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="section-title" style="border-top:none;padding-top:2px">앱 목록</div>
      <div class="hint">탭으로 등록할 앱을 추가하세요.</div>
      <div id="app-list-ui"></div>
      <button class="add-app-btn" onclick="openAppForm()">+ 앱 추가</button>
      <div id="actor-filters"></div>
    </div>
  </div>
</div>

<!-- 앱 추가 폼 -->
<div class="overlay" id="ov-app-form" onclick="closeOnBg(event,'ov-app-form')">
  <div class="sheet" id="sheet-app-form">
    <div class="sheet-handle"></div>
    <div class="custom-hd">
      <div class="custom-title">앱 추가</div>
      <button class="custom-close" onclick="closeAppForm()">✕</button>
    </div>
    <div id="preset-section" style="padding:0 16px 4px">
      <div class="form-label" style="padding:6px 0 8px">알려진 앱</div>
      <div id="preset-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>
    <div style="padding:12px 16px 4px;border-top:1px solid var(--border);margin-top:8px">
      <div class="form-label" style="padding:0 0 10px">직접 추가</div>
    </div>
    <div class="form-row" style="padding-top:0">
      <div class="form-label">앱 이름</div>
      <input class="form-input" id="af-name" placeholder="예: 라져">
    </div>
    <div class="form-row">
      <div class="form-label">아이콘 (이모지 또는 1-2글자, 선택)</div>
      <input class="form-input" id="af-icon" placeholder="예: ✈">
    </div>
    <div class="form-row">
      <div class="form-label">스케줄 JSON URL</div>
      <input class="form-input" id="af-schedule-url" type="url" placeholder="https://...schedule.json">
    </div>
    <div class="form-row">
      <div class="form-label">앱 URL (탭으로 열 앱, 선택)</div>
      <input class="form-input" id="af-app-url" type="url" placeholder="https://...">
    </div>
    <div class="form-row">
      <div class="form-label">관람기록 키 (선택)</div>
      <input class="form-input" id="af-records-key" placeholder="예: roger_records">
      <div class="hint" style="margin-top:5px">앱이 사용하는 localStorage 키. 비워두면 관람기록 연동 없음.</div>
    </div>
    <div class="form-row">
      <div class="form-label">색상</div>
      <div class="color-picker" id="af-colors"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAppForm()">취소</button>
      <button class="btn-primary" onclick="saveAppForm()">추가</button>
    </div>
  </div>
</div>

<script>
  const APPS_KEY   = 'hub_apps';
  const PREFS_KEY  = 'hub_prefs';
  const THEME_KEY  = 'hub_theme';
  const CUSTOM_KEY = 'hub_custom';
  const DOW        = ['일','월','화','수','목','금','토'];

  const COLOR_PALETTE = [
    '#7aacff','#f06070','#a78bfa','#f472b6',
    '#fb923c','#facc15','#4ade80','#22d3ee','#f87171',
  ];

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function appStyle(color) {
    return `background:${hexToRgba(color,0.16)};color:${color};border:1px solid ${hexToRgba(color,0.36)}`;
  }

  // ── 앱 설정 ──
  const PRESET_APPS = [
    {
      id: 'app_outcasts',
      name: '아웃캐스트',
      icon: '',
      scheduleUrl: 'https://musical-otk.github.io/outcasts2026/schedule.json',
      appUrl: 'https://musical-otk.github.io/outcasts2026/',
      color: '#7aacff',
      recordsKey: 'outcasts_records',
    },
    {
      id: 'app_eoduk',
      name: '어둑시니',
      icon: '',
      scheduleUrl: 'https://musical-otk.github.io/sinimuni2026/schedule.json',
      appUrl: 'https://musical-otk.github.io/sinimuni2026/',
      color: '#f06070',
      recordsKey: 'eoduk_records',
    },
  ];

  function getApps() {
    try { return JSON.parse(localStorage.getItem(APPS_KEY)) || []; }
    catch { return []; }
  }
  function saveApps(list) { localStorage.setItem(APPS_KEY, JSON.stringify(list)); }

  // ── 배우 필드 자동 감지 (date, time 제외) ──
  function getActorFields(record) {
    return Object.keys(record).filter(k => k !== 'date' && k !== 'time' && !k.startsWith('_'));
  }

  // ── 탭 렌더링 ──
  function renderTabs() {
    document.getElementById('app-tabs').innerHTML = getApps().map(app =>
      `<button class="app-btn" id="btn-${app.id}" onclick="switchView('${app.id}')">${app.icon ? app.icon + ' ' : ''}${app.name}</button>`
    ).join('');
  }

  // ── iframe 렌더링 ──
  function renderFrames() {
    const apps = getApps();
    const container = document.getElementById('app-frames');
    apps.forEach(app => {
      if (app.appUrl && !document.getElementById(`frame-${app.id}`)) {
        const iframe = document.createElement('iframe');
        iframe.id = `frame-${app.id}`;
        iframe.className = 'app-frame';
        iframe.src = 'about:blank';
        container.appendChild(iframe);
      }
    });
    const appIds = new Set(apps.map(a => a.id));
    container.querySelectorAll('iframe').forEach(f => {
      if (!appIds.has(f.id.replace('frame-', ''))) f.remove();
    });
  }

  // ── 색상 선택 ──
  function selectColorSwatch(el) {
    el.closest('.color-picker').querySelectorAll('.color-swatch')
      .forEach(s => s.classList.toggle('selected', s === el));
  }

  function renderColorPicker(containerId, selectedHex) {
    const hex = selectedHex || COLOR_PALETTE[0];
    document.getElementById(containerId).innerHTML = COLOR_PALETTE.map(c =>
      `<div class="color-swatch${c === hex ? ' selected' : ''}" style="background:${c}"
        data-hex="${c}" onclick="selectColorSwatch(this)"></div>`
    ).join('');
  }

  // ── 상태 ──
  let schedules = {};
  let currentYear, currentMonth;
  let currentView = 'cal';
  const todayStr = new Date().toISOString().slice(0, 10);

  // ── 뷰 전환 ──
  function switchView(view) {
    if (currentView === view) { switchView('cal'); return; }
    currentView = view;

    document.getElementById('view-cal').classList.toggle('hidden', view !== 'cal');

    getApps().forEach(app => {
      const frame = document.getElementById(`frame-${app.id}`);
      const btn   = document.getElementById(`btn-${app.id}`);
      const isActive = view === app.id;

      if (frame) {
        frame.classList.toggle('active', isActive);
        if (isActive && frame.src === 'about:blank') frame.src = app.appUrl;
      }
      if (btn) {
        btn.style.cssText = isActive
          ? `background:${hexToRgba(app.color,0.16)};color:${app.color};border-color:${hexToRgba(app.color,0.36)}`
          : '';
      }
    });
  }

  function goToToday() {
    currentView = 'cal';
    document.getElementById('view-cal').classList.remove('hidden');
    getApps().forEach(app => {
      const frame = document.getElementById(`frame-${app.id}`);
      const btn   = document.getElementById(`btn-${app.id}`);
      if (frame) frame.classList.remove('active');
      if (btn) btn.style.cssText = '';
    });
    const t = new Date();
    currentYear = t.getFullYear(); currentMonth = t.getMonth();
    renderCalendar();
  }

  // ── 테마 ──
  function getTheme() { return localStorage.getItem(THEME_KEY) || 'dark'; }
  function applyTheme(t) {
    document.body.classList.toggle('light', t === 'light');
    document.getElementById('theme-btn').textContent = t === 'light' ? '🌙' : '☀️';
    document.getElementById('meta-theme').content = t === 'light' ? '#f8f8f6' : '#111118';
  }
  function toggleTheme() {
    const next = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  }

  // ── 배우 필터 ──
  function getPrefs() {
    try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; }
    catch { return {}; }
  }
  function savePrefs(p) { localStorage.setItem(PREFS_KEY, JSON.stringify(p)); }

  function matchesFilter(session, selected) {
    if (!selected || !selected.length) return true;
    return getActorFields(session).some(f => session[f] && selected.includes(session[f]));
  }

  // ── 커스텀 이벤트 ──
  function getCustom() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_KEY)) || []; } catch { return []; }
  }
  function saveCustom(list) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(list)); }

  let _customEditId = null, _customFormDs = '';

  function openCustomForm(ds, editId) {
    _customEditId = editId || null;
    _customFormDs = ds || todayStr;
    const ev = editId ? getCustom().find(e => e.id === editId) : null;
    document.getElementById('custom-form-title').textContent = ev ? '기타 일정 수정' : '기타 일정 추가';
    document.getElementById('cf-date').value    = ev ? ev.date    : _customFormDs;
    document.getElementById('cf-time').value    = ev ? ev.time    : '20:00';
    document.getElementById('cf-name').value    = ev ? ev.name    : '';
    document.getElementById('cf-comment').value = ev ? ev.comment : '';
    renderColorPicker('cf-colors', ev ? ev.color : COLOR_PALETTE[0]);
    document.getElementById('ov-detail').classList.remove('open');
    document.getElementById('ov-custom').classList.add('open');
  }
  function openCustomFormForDay() { openCustomForm(_customFormDs); }
  function closeCustomForm() { document.getElementById('ov-custom').classList.remove('open'); }

  function saveCustomEvent() {
    const date = document.getElementById('cf-date').value;
    const name = document.getElementById('cf-name').value.trim();
    if (!date || !name) { alert('날짜와 공연명을 입력해주세요'); return; }
    const time    = document.getElementById('cf-time').value;
    const comment = document.getElementById('cf-comment').value.trim();
    const color   = document.querySelector('#cf-colors .color-swatch.selected')?.dataset.hex || COLOR_PALETTE[0];
    const list = getCustom();
    if (_customEditId) {
      const idx = list.findIndex(e => e.id === _customEditId);
      if (idx !== -1) list[idx] = { id: _customEditId, date, time, name, comment, color };
    } else {
      list.push({ id: Date.now(), date, time, name, comment, color });
    }
    saveCustom(list);
    closeCustomForm();
    renderCalendar();
  }

  function deleteCustomEvent(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    saveCustom(getCustom().filter(e => e.id !== id));
    document.getElementById('ov-detail').classList.remove('open');
    renderCalendar();
  }

  // ── 관람 기록 ──
  function getAttended() {
    const map = {};
    getApps().forEach(app => {
      if (!app.recordsKey) return;
      try {
        (JSON.parse(localStorage.getItem(app.recordsKey) || '[]')).forEach(r => {
          if (!r.date) return;
          (map[r.date] = map[r.date] || []).push({
            appId: app.id, time: r.time,
            seatZone: r.seatZone, seatRow: r.seatRow, seatNumber: r.seatNumber,
          });
        });
      } catch {}
    });
    return map;
  }

  // ── 배우 목록 ──
  function extractActors(schedule) {
    const s = new Set();
    schedule.forEach(r => getActorFields(r).forEach(f => r[f] && s.add(r[f])));
    return [...s].sort((a, b) => a.localeCompare(b, 'ko'));
  }

  // ── 시간 포맷 ──
  function fmtTime(t) {
    if (!t) return '';
    const h = parseInt(t);
    return (h >= 13 ? h - 12 : h) + '시';
  }

  // ── 달력 ──
  function changeMonth(d) {
    currentMonth += d;
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('cal-month-label').textContent = `${currentYear}년 ${currentMonth + 1}월`;
    const first    = new Date(currentYear, currentMonth, 1).getDay();
    const days     = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prefs    = getPrefs();
    const attended = getAttended();
    const custom   = getCustom();
    const apps     = getApps();
    let html = '';

    for (let i = 0; i < first; i++) html += '<div class="cal-cell"></div>';

    for (let d = 1; d <= days; d++) {
      const ds  = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow = (first + d - 1) % 7;
      const dayAtt  = attended[ds] || [];
      const att     = dayAtt.length > 0;

      const allSess = apps.flatMap(app => {
        const sch = schedules[app.id] || [];
        const appPrefs = prefs[app.id] || [];
        return sch
          .filter(s => s.date === ds && matchesFilter(s, appPrefs))
          .map(s => ({...s, _app: app}));
      }).sort((a,b) => (a.time||'').localeCompare(b.time||''));

      const showC  = custom.filter(e => e.date === ds);
      const hasSch = allSess.length > 0 || showC.length > 0;
      const isToday = ds === todayStr;

      const cls = ['cal-cell',
        hasSch      ? 'has-schedule' : '',
        att||hasSch ? 'clickable'    : '',
        dow === 0   ? 'sunday'       : '',
        dow === 6   ? 'saturday'     : '',
        isToday     ? 'today'        : '',
      ].filter(Boolean).join(' ');

      const sessBadges = allSess.map(s => {
        const attCnt = dayAtt.filter(r => r.appId === s._app.id && (!r.time || r.time === s.time)).length;
        const chk    = attCnt >= 2 ? `✅×${attCnt}` : (attCnt === 1 ? '✅' : '');
        return `<div class="badge-row">
          <span class="att-chk">${chk}</span>
          <span class="badge" style="${appStyle(s._app.color)}">${s._app.icon || s._app.name.slice(0,2)}</span>
          <span class="badge-time">${fmtTime(s.time)}</span>
        </div>`;
      }).join('');

      const customBadges = showC.map(e => {
        const col = e.color || COLOR_PALETTE[0];
        return `<div class="badge-row">
          <span class="att-chk">✅</span>
          <span class="badge" style="${appStyle(col)}">${e.name.length > 3 ? e.name.slice(0,3)+'…' : e.name}</span>
        </div>`;
      }).join('');

      html += `<div class="${cls}" ${att||hasSch ? `onclick="openDay('${ds}')"` : ''}>
        <div class="date-wrap"><span class="date-num">${d}</span></div>
        ${att && !hasSch ? '<div class="attended-dot"></div>' : ''}
        ${hasSch ? `<div class="badges">${sessBadges}${customBadges}</div>` : ''}
      </div>`;
    }
    document.getElementById('cal-days').innerHTML = html;
  }

  // ── 날짜 상세 ──
  function openDay(ds) {
    _customFormDs = ds;
    const attended = getAttended();
    const d = new Date(ds + 'T00:00:00');
    document.getElementById('sheet-date').textContent =
      `${ds.slice(5).replace('-','.')}(${DOW[d.getDay()]})`;

    const prefs  = getPrefs();
    const dayAtt = attended[ds] || [];
    const apps   = getApps();

    const sessions = apps.flatMap(app => {
      const sch = schedules[app.id] || [];
      const appPrefs = prefs[app.id] || [];
      return sch
        .filter(s => s.date === ds && (matchesFilter(s, appPrefs) || dayAtt.some(r => r.appId === app.id && (!r.time || r.time === s.time))))
        .map(s => ({...s, _app: app}));
    }).sort((a,b) => (a.time||'').localeCompare(b.time||''));

    const customs = getCustom().filter(e => e.date === ds)
      .sort((a,b) => (a.time||'').localeCompare(b.time||''));

    const regularHtml = sessions.map(s => {
      const cast = getActorFields(s).map(f => s[f]).filter(Boolean).join(' · ');
      const attRecs = dayAtt.filter(r => r.appId === s._app.id && (!r.time || r.time === s.time));
      const attHtml = attRecs.map(r => {
        const seat = r.seatZone
          ? [r.seatZone + '구역', r.seatRow + '열', r.seatNumber + '번'].filter(Boolean).join(' ')
          : '';
        return `<div class="session-meta"><span class="session-attended">✓ 관람</span>${seat ? `&nbsp;&nbsp;${seat}` : ''}</div>`;
      }).join('');
      return `<div class="session-row">
        <div class="session-time">${s.time}</div>
        <div class="session-body">
          <span class="session-tag" style="${appStyle(s._app.color)}">${s._app.name}</span>
          <div class="session-cast">${cast}</div>
          ${attHtml}
        </div>
      </div>`;
    }).join('');

    const customHtml = customs.map(e => {
      const col = e.color || COLOR_PALETTE[0];
      return `<div class="session-row">
        <div class="session-time">${e.time || '—'}</div>
        <div class="session-body">
          <span class="session-tag" style="${appStyle(col)}">기타</span>
          <div class="session-cast">${e.name}</div>
          ${e.comment ? `<div class="session-meta">${e.comment}</div>` : ''}
        </div>
        <div class="session-acts">
          <button class="session-act-btn" onclick="openCustomForm('${ds}',${e.id})">✏️</button>
          <button class="session-act-btn" onclick="deleteCustomEvent(${e.id})">🗑️</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('sheet-content').innerHTML =
      (regularHtml + customHtml) || '<div style="padding:16px;color:var(--text3);font-size:13px;">일정 없음</div>';

    document.getElementById('ov-detail').classList.add('open');
  }

  // ── 설정 ──
  function openSettings() {
    renderSettingsAppList();
    renderActorFilters();
    document.getElementById('ov-settings').classList.add('open');
  }
  function closeSettings() { document.getElementById('ov-settings').classList.remove('open'); }

  function renderSettingsAppList() {
    const apps = getApps();
    document.getElementById('app-list-ui').innerHTML = apps.length
      ? apps.map(app => `
        <div class="app-list-item">
          <div class="app-list-dot" style="background:${app.color}"></div>
          <div class="app-list-name">${app.icon ? app.icon + ' ' : ''}${app.name}</div>
          <button class="app-list-del" onclick="deleteApp('${app.id}')">✕</button>
        </div>`).join('')
      : '<div style="font-size:12px;color:var(--text3);padding:6px 0">등록된 앱이 없습니다</div>';
  }

  function renderActorFilters() {
    const apps  = getApps();
    const prefs = getPrefs();
    document.getElementById('actor-filters').innerHTML = apps.map(app => {
      const actors = extractActors(schedules[app.id] || []);
      if (!actors.length) return '';
      const selected = prefs[app.id] || [];
      const chips = actors.map(a => {
        const isOn = selected.includes(a);
        const chipStyle = isOn ? `background:${hexToRgba(app.color,0.16)};color:${app.color};border-color:${hexToRgba(app.color,0.36)}` : '';
        return `<button class="chip${isOn ? ' on' : ''}" style="${chipStyle}"
          onclick="toggleActor('${app.id}','${a}',this,'${app.color}')">${a}</button>`;
      }).join('');
      return `<div class="section-title" style="color:${app.color}">${app.icon ? app.icon + ' ' : ''}${app.name}</div>
              <div class="hint">선택한 배우의 일정만 표시됩니다. 아무것도 선택 안 하면 전체 표시.</div>
              <div class="actor-list">${chips}</div>`;
    }).join('');
  }

  function toggleActor(appId, name, el, color) {
    const prefs = getPrefs();
    prefs[appId] = prefs[appId] || [];
    const idx = prefs[appId].indexOf(name);
    if (idx === -1) prefs[appId].push(name); else prefs[appId].splice(idx, 1);
    savePrefs(prefs);
    const isOn = prefs[appId].includes(name);
    el.classList.toggle('on', isOn);
    el.style.cssText = isOn ? `background:${hexToRgba(color,0.16)};color:${color};border-color:${hexToRgba(color,0.36)}` : '';
    renderCalendar();
  }

  function deleteApp(id) {
    if (!confirm('앱을 목록에서 삭제하시겠습니까?')) return;
    saveApps(getApps().filter(a => a.id !== id));
    delete schedules[id];
    renderTabs();
    renderFrames();
    renderSettingsAppList();
    renderActorFilters();
    renderCalendar();
  }

  // ── 앱 추가 폼 ──
  function openAppForm() {
    document.getElementById('af-name').value = '';
    document.getElementById('af-icon').value = '';
    document.getElementById('af-schedule-url').value = '';
    document.getElementById('af-app-url').value = '';
    document.getElementById('af-records-key').value = '';
    renderColorPicker('af-colors', COLOR_PALETTE[0]);
    renderPresets();
    document.getElementById('ov-settings').classList.remove('open');
    document.getElementById('ov-app-form').classList.add('open');
  }

  function renderPresets() {
    const addedIds = new Set(getApps().map(a => a.id));
    document.getElementById('preset-list').innerHTML = PRESET_APPS.map(p => {
      const added = addedIds.has(p.id);
      return `<div class="preset-item${added ? ' added' : ''}" onclick="addPreset('${p.id}')">
        <div class="preset-dot" style="background:${p.color}"></div>
        <div class="preset-name">${p.name}</div>
        <div class="preset-add">${added ? '추가됨' : '+ 추가'}</div>
      </div>`;
    }).join('');
  }

  async function addPreset(id) {
    const preset = PRESET_APPS.find(p => p.id === id);
    if (!preset) return;
    const apps = getApps();
    if (apps.find(a => a.id === id)) return;
    apps.push({...preset});
    saveApps(apps);
    try { schedules[id] = await fetch(preset.scheduleUrl).then(r => r.json()); } catch {}
    renderTabs();
    renderFrames();
    renderPresets();
    renderCalendar();
  }

  function closeAppForm() {
    document.getElementById('ov-app-form').classList.remove('open');
    openSettings();
  }

  async function saveAppForm() {
    const name        = document.getElementById('af-name').value.trim();
    const icon        = document.getElementById('af-icon').value.trim();
    const scheduleUrl = document.getElementById('af-schedule-url').value.trim();
    const appUrl      = document.getElementById('af-app-url').value.trim();
    const recordsKey  = document.getElementById('af-records-key').value.trim();
    if (!name || !scheduleUrl) { alert('앱 이름과 스케줄 URL을 입력해주세요'); return; }
    const color = document.querySelector('#af-colors .color-swatch.selected')?.dataset.hex || COLOR_PALETTE[0];
    const id = 'app_' + Date.now();
    const app = { id, name, icon, scheduleUrl, appUrl, color, recordsKey: recordsKey || null };
    const apps = getApps();
    apps.push(app);
    saveApps(apps);
    try {
      schedules[id] = await fetch(scheduleUrl).then(r => r.json());
    } catch {}
    renderTabs();
    renderFrames();
    document.getElementById('ov-app-form').classList.remove('open');
    openSettings();
    renderCalendar();
  }

  function closeOnBg(e, id) {
    if (e.target === document.getElementById(id))
      document.getElementById(id).classList.remove('open');
  }

  // ── 초기화 ──
  async function init() {
    applyTheme(getTheme());
    const t = new Date();
    currentYear = t.getFullYear(); currentMonth = t.getMonth();
    renderTabs();
    renderFrames();
    const apps = getApps();
    if (!apps.length) {
      document.getElementById('status').textContent = '⚙️ 설정에서 앱을 추가해 주세요';
      return;
    }
    await Promise.all(apps.map(async app => {
      try { schedules[app.id] = await fetch(app.scheduleUrl).then(r => r.json()); }
      catch {}
    }));
    document.getElementById('status').style.display = 'none';
    renderCalendar();
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/otk-schedule/sw.js');
  init();
</script>
</body>
</html>
